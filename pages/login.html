<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="../js/auth.js"></script>
    <title>Login - tomo.</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/components.css">
</head>
<body class="pantalla-acceso">

<main class="contenedor-acceso">
    <div class="tarjeta-acceso">
        <h2 class="titulo-acceso">tomo.</h2>
        <p class="subtitulo-acceso">Ingresá a tu biblioteca personal</p>

        <form id="formulario-login">
            <!-- usuario -->
            <div class="grupo-formulario">
                <label class="etiqueta-formulario">Usuario o Correo</label>
                <input type="text" name="usuario" id="usuario" class="entrada-formulario" placeholder="laraain123@gmail.com" required>
            </div>

            <!-- contraseña -->
            <div class="grupo-formulario">
                <label class="etiqueta-formulario">Contraseña</label>
                <input type="password" name="clave" id="clave" class="entrada-formulario" placeholder="••••••••" required>
            </div>

            <button id="login" type="submit" class="boton-bloque">Iniciar Sesion</button>
        </form>

        <div class="pie-tarjeta">
            <p>¿No tenés cuenta? <a href="../pages/singup.html" class="enlace-acceso">Crear Cuenta</a></p>
            <a href="../index.html" class="enlace-volver">← Volver al inicio</a>
        </div>
    </div>
</main>

    </body>
</html>
